services:
  - type: web
    name: athlete-tracker-api
    runtime: node
    rootDir: athlete-tracker-server
    buildCommand: npm install && npx prisma migrate deploy && npm run seed
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
